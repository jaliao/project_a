#  * 2025-07-22
#  * ----------------------------------------------
#  */

services:
  studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "${UID}:${GID}"
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    ports:
      - "5555:5555"
    env_file:
      - .env
    command: npx prisma studio --browser none --port 5555
    depends_on:
      - db
    profiles:
      - studio

  web:
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules # 專案目錄模式
      - ./ssl:/app/ssl # 自簽憑證掛載進入容器
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_OPTIONS=--max-old-space-size=6144

  cloudflared:
    image: cloudflare/cloudflared:latest
    # 強制 http2：避免 WSL2/Docker 的 QUIC/UDP 問題
    # TUNNEL_TOKEN 由環境變數傳入，不放在 command 避免解析錯誤
    command: tunnel --no-autoupdate --protocol http2 run
    restart: unless-stopped
    depends_on:
      - web
    env_file:
      - .env
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
